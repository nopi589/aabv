<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألبوم مخيم الحوزية-المواطنة 3.0 | سفراء الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-blue: #1e3a8a; --accent-red: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; padding-top: 40px; }
        
        .gallery-title { color: var(--main-blue); font-weight: 900; margin-bottom: 30px; }
        
        .photo-card {
            background: white;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.4s;
            height: 300px; /* وحدت الطول باش يجي السطر مقاد */
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .back-btn {
            background: var(--main-blue);
            color: white;
            border-radius: 50px;
            padding: 10px 25px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
            margin-bottom: 40px;
        }
        .back-btn:hover { background: var(--accent-red); color: white; }

        /* ستايل المودال */
        .modal-content { background-color: transparent; border: none; }
        .modal-backdrop.show { opacity: 0.9; backdrop-filter: blur(5px); }
        #fullImage { 
            max-height: 85vh; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <a href="camps.html" class="back-btn shadow-sm">
            <i class="fas fa-arrow-right ms-2"></i> العودة للمخيمات
        </a>

        <h1 class="gallery-title">ألبوم مخيم الحوزية-مواطنة 3.0</h1>

        <div class="row g-4">
            
            <div class="col-6 col-md-4 col-lg-3">
                <div class="photo-card" onclick="showImage('WhatsApp Image 2026-05-03 at 15.17.35.jpeg')">
                    <img src="WhatsApp Image 2026-05-03 at 15.17.35.jpeg" alt="Houzia Photo 1">
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="photo-card" onclick="showImage('WhatsApp Image 2026-05-03 at 14.59.28.jpeg')">
                    <img src="WhatsApp Image 2026-05-03 at 14.59.28.jpeg" alt="Houzia Photo 2">
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="photo-card" onclick="showImage('WhatsApp Image 2026-05-03 at 14.56.00.jpeg')">
                    <img src="WhatsApp Image 2026-05-03 at 14.56.00.jpeg" alt="Houzia Photo 3">
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="photo-card" onclick="showImage('WhatsApp Image 2026-05-05 at 02.40.22 (1).jpeg')">
                    <img src="WhatsApp Image 2026-05-05 at 02.40.22 (1).jpeg" alt="robotic Photo 4">
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="photo-card" onclick="showImage('WhatsApp Image 2026-05-05 at 02.40.22 (2).jpeg')">
                    <img src="WhatsApp Image 2026-05-05 at 02.40.22 (2).jpeg" alt="robotic Photo 5">
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <div class="photo-card" onclick="showImage('WhatsApp Image 2026-05-05 at 02.40.23.jpeg')">
                    <img src="WhatsApp Image 2026-05-05 at 02.40.23.jpeg" alt="robotic Photo 5">
                </div>
            </div>


        </div>
    </div>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-body text-center position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
                    <img src="" id="fullImage" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <footer class="py-5 text-center text-muted mt-5">
        <p>جمعية سفراء الخير - المكتب الوطني © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showImage(src) {
            document.getElementById('fullImage').src = src;
            var myModal = new bootstrap.Modal(document.getElementById('imageModal'));
            myModal.show();
        }
    </script>
</body>
</html>
