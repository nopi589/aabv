<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي المعلومات | سفراء الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #1e3a8a; --accent-red: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; min-height: 100vh; }
        .nav-back { background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .quiz-container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .quiz-card { background: white; border-radius: 25px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .question-text { font-size: 1.5rem; font-weight: 700; color: var(--main-blue); margin-bottom: 25px; line-height: 1.6; }
        .option-btn { width: 100%; text-align: right; padding: 15px 20px; margin-bottom: 12px; border: 2px solid #f1f5f9; border-radius: 15px; background: white; transition: 0.3s; font-weight: 600; font-size: 1.1rem; }
        .option-btn:hover:not(:disabled) { background: #f8fafc; border-color: var(--main-blue); transform: translateX(-5px); }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .progress-bar-custom { height: 8px; border-radius: 10px; background: #e2e8f0; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--main-blue); transition: 0.5s; width: 0%; }
        #next-btn { display: none; margin-top: 20px; width: 100%; border-radius: 50px; padding: 12px; font-weight: 700; }
        .score-badge { background: #fee2e2; color: var(--accent-red); padding: 5px 15px; border-radius: 50px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="nav-back text-end shadow-sm">
        <div class="container">
            <a href="games.html" class="text-decoration-none fw-bold text-dark">
                <i class="fas fa-arrow-right ms-2 text-primary"></i> رجوع للألعاب
            </a>
        </div>
    </div>

    <div class="quiz-container">
        <div class="quiz-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span id="question-number" class="fw-bold text-muted">السؤال 1/10</span>
                <span class="score-badge">النقاط: <span id="current-score">0</span></span>
            </div>
            
            <div class="progress-bar-custom">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div id="quiz-content">
                <div class="question-text" id="question">جاري التحميل...</div>
                <div id="options-list"></div>
                <button id="next-btn" class="btn btn-dark shadow" onclick="handleNext()">
                    السؤال التالي <i class="fas fa-arrow-left me-2"></i>
                </button>
            </div>

            <div id="result-screen" style="display: none;" class="text-center py-4">
                <i class="fas fa-trophy fa-4x text-warning mb-3"></i>
                <h2 class="fw-900 mb-2">انتهى التحدي!</h2>
                <p class="fs-4 mb-4">جبتي <span id="final-score" class="text-danger fw-bold">0</span> من 10</p>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary rounded-pill py-3 fw-bold" onclick="location.reload()">إعادة المحاولة</button>
                    <a href="games.html" class="btn btn-outline-secondary rounded-pill py-3 fw-bold">الرجوع للألعاب</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "ما هي عاصمة المغرب؟", options: ["فاس", "الرباط", "الدار البيضاء", "مراكش"], correct: 1 },
            { q: "من هو الهداف التاريخي لكأس العالم؟", options: ["ميسي", "رونالدو", "ميروسلاف كلوزه", "بيليه"], correct: 2 },
            { q: "أكبر قارة في العالم من حيث المساحة هي:", options: ["أفريقيا", "أمريكا", "آسيا", "أوروبا"], correct: 2 },
            { q: "كم عدد سُور القرآن الكريم؟", options: ["114 سورة", "110 سورة", "120 سورة", "112 سورة"], correct: 0 },
            { q: "أين تقع الكعبة المشرفة؟", options: ["المدينة المنورة", "القدس", "مكة المكرمة", "القاهرة"], correct: 2 },
            { q: "ما هو أسرع حيوان بري في العالم؟", options: ["الأسد", "النمر", "الفهد", "الغزال"], correct: 2 },
            { q: "من هو مكتشف الجاذبية؟", options: ["أينشتاين", "نيوتن", "غاليلو", "إديسون"], correct: 1 },
            { q: "ما هو لون الزمرد؟", options: ["أحمر", "أزرق", "أصفر", "أخضر"], correct: 3 },
            { q: "كم عدد ألوان قوس قزح؟", options: ["6 ألوان", "7 ألوان", "8 ألوان", "5 ألوان"], correct: 1 },
            { q: "ما هو أكبر كوكب في المجموعة الشمسية؟", options: ["المريخ", "الأرض", "المشتري", "زحل"], correct: 2 }
        ];

        let currentIdx = 0;
        let score = 0;
        let isAnswered = false;

        function initQuiz() {
            const q = questions[currentIdx];
            document.getElementById('question').innerText = q.q;
            document.getElementById('question-number').innerText = `السؤال ${currentIdx + 1}/${questions.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
            
            const optionsBox = document.getElementById('options-list');
            optionsBox.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsBox.appendChild(btn);
            });
            
            document.getElementById('next-btn').style.display = 'none';
            isAnswered = false;
        }

        function checkAnswer(selected, btn) {
            if (isAnswered) return;
            isAnswered = true;
            const correct = questions[currentIdx].correct;
            const buttons = document.getElementsByClassName('option-btn');
            
            if (selected === correct) {
                btn.classList.add('correct');
                score++;
                document.getElementById('current-score').innerText = score;
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
            }
            document.getElementById('next-btn').style.display = 'block';
        }

        function handleNext() {
            currentIdx++;
            if (currentIdx < questions.length) {
                initQuiz();
            } else {
                document.getElementById('quiz-content').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                document.getElementById('final-score').innerText = score;
            }
        }

        initQuiz();
    </script>
</body>
</html>
