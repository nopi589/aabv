<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار الجمعية - سفراء الخير</title>
    <link rel="stylesheet" href="style.css"> <style>
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .news-card { border: 1px solid #ddd; border-radius: 10px; overflow: hidden; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }
        .news-content { padding: 15px; }
        .news-title { font-size: 1.2rem; color: #2c3e50; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>أخبار ومقالات الجمعية</h1>
    </header>

    <div class="news-grid" id="news-container">
        <p id="loading">جاري تحميل الأخبار...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function loadNews() {
            const container = document.getElementById('news-container');
            const repoOwner = "YOUR_GITHUB_USERNAME"; // بدلي هادي بسميتك فـ GitHub
            const repoName = "YOUR_REPO_NAME"; // بدلي هادي بسمية الريبو ديالك
            
            try {
                // كنجيبو قائمة الملفات من مجلد content/news
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/content/news`);
                const files = await response.json();
                
                container.innerHTML = ''; // مسح رسالة التحميل

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const contentRes = await fetch(file.download_url);
                        const text = await contentRes.text();
                        
                        // تقسيم الملف (Frontmatter) باش ناخدو العنوان والتصويرة
                        const parts = text.split('---');
                        const meta = {};
                        parts[1].split('\n').forEach(line => {
                            const [key, ...value] = line.split(':');
                            if (key) meta[key.trim()] = value.join(':').trim();
                        });

                        const htmlContent = marked.parse(parts[2] || "");

                        // بناء الكارط ديال الخبر
                        container.innerHTML += `
                            <div class="news-card">
                                <img src="${meta.image}" alt="${meta.title}">
                                <div class="news-content">
                                    <h2 class="news-title">${meta.title}</h2>
                                    <div class="news-text">${htmlContent.substring(0, 150)}...</div>
                                    <small>${meta.date || ''}</small>
                                </div>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                container.innerHTML = '<p>تعذر تحميل الأخبار حالياً.</p>';
                console.error(error);
            }
        }
        loadNews();
    </script>
</body>
</html>
