<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألبوم مخيم السعيدية | سفراء الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-blue: #1e3a8a; --accent-red: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; padding-top: 40px; }
        
        .gallery-title { color: var(--main-blue); font-weight: 900; margin-bottom: 30px; }
        
        /* ستايل الكارط */
        .photo-card {
            background: white;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.4s;
            height: 350px; 
            cursor: pointer; /* كيبين أنها قابلة للضغط */
        }
        
        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .photo-card:hover img {
            filter: brightness(0.8); /* كتضلام شوية فاش كدوز عليها */
        }

        .back-btn {
            background: var(--main-blue);
            color: white;
            border-radius: 50px;
            padding: 10px 25px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
            margin-bottom: 40px;
        }
        .back-btn:hover { background: var(--accent-red); color: white; }

        /* ستايل الزوم (Modal) */
        .modal-content { background-color: transparent; border: none; }
        .modal-backdrop.show { opacity: 0.9; backdrop-filter: blur(8px); }
        #fullImage { 
            max-height: 85vh; 
            border-radius: 15px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.6); 
        }
        .btn-close-white { filter: invert(1) grayscale(100%) brightness(200%); }
    </style>
    <meta name="description" content="المكتب الوطني لجمعية سفراء الخير - جمعية وطنية تعنى بالعمل الخيري، التخييم، والأنشطة التربوية والاجتماعية في المغرب.">
<meta name="keywords" content="سفراء الخير, جمعية سفراء الخير, المكتب الوطني, مخيمات صيفية المغرب, عمل خيري المغرب, تطوع المغرب">
<meta name="author" content="المكتب الوطني لسفراء الخير">

<meta property="og:title" content="المكتب الوطني لسفراء الخير | الموقع الرسمي">
<meta property="og:description" content="شاركنا العطاء وكن سفيراً للخير. الموقع الرسمي للجمعية بالمغرب.">
<meta property="og:image" content="Image1.jpeg"> <meta property="og:url" content="https://www.yourdomain.com">
</head>
<body>

    <div class="container text-center">
        <a href="camps.html" class="back-btn shadow-sm">
            <i class="fas fa-arrow-right ms-2"></i> العودة للمخيمات
        </a>

        <h1 class="gallery-title">صور مخيم السعيدية</h1>

        <div class="row g-4">
            
            <div class="col-md-6 col-lg-3">
                <div class="photo-card" onclick="showImage('s3ydya.jpg')">
                    <img src="s3ydya.jpg" alt="Seidia Photo 1">
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="photo-card" onclick="showImage('s3ydya 3.jpg')">
                    <img src="s3ydya 3.jpg" alt="Seidia Photo 2">
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="photo-card" onclick="showImage('s3ydya 2.jpg')">
                    <img src="s3ydya 2.jpg" alt="Seidia Photo 3">
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="photo-card" onclick="showImage('s3ydya 1.jpg')">
                    <img src="s3ydya 1.jpg" alt="Seidia Photo 4">
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-body text-center position-relative p-0">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close" style="z-index: 9999;"></button>
                    <img src="" id="fullImage" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <footer class="py-5 text-center text-muted mt-5">
        <p>جمعية سفراء الخير - المكتب الوطني © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function showImage(src) {
            // كيحط رابط التصويرة فالمودال
            document.getElementById('fullImage').src = src;
            // كيفتح المودال
            var myModal = new bootstrap.Modal(document.getElementById('imageModal'));
            myModal.show();
        }
    </script>
</body>
</html>
