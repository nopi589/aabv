<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألبوم مخيم الحسيمة | سفراء الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --main-blue: #1e3a8a; 
            --hoceima-blue: #0ea5e9; 
            --accent-red: #ef4444; 
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f0f9ff; 
            padding-top: 50px; 
        }
        
        .gallery-title { 
            color: var(--main-blue); 
            font-weight: 900; 
            margin-bottom: 10px; 
            font-size: 2.5rem;
        }
        
        .gallery-subtitle {
            color: var(--hoceima-blue);
            font-weight: 700;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        
        .photo-card {
            background: white;
            border: none;
            border-radius: 25px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(14, 165, 233, 0.1); 
            transition: 0.4s ease-in-out;
            height: 380px; 
            cursor: pointer; /* كيبين أن الصورة قابلة للضغط */
        }
        
        .photo-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.2);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: 0.5s;
        }
        
        .photo-card:hover img {
            transform: scale(1.05);
            filter: brightness(0.9);
        }

        .back-btn {
            background: var(--main-blue);
            color: white;
            border-radius: 50px;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.2);
        }
        .back-btn:hover { 
            background: var(--hoceima-blue); 
            color: white; 
            transform: translateX(5px);
        }

        /* ستايل المودال (النافذة المنبثقة) */
        .modal-content {
            background-color: transparent;
            border: none;
        }
        .modal-body {
            position: relative;
            padding: 0;
        }
        .modal-backdrop.show {
            opacity: 0.9;
            backdrop-filter: blur(5px);
        }
        #fullImage {
            max-height: 90vh;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        footer {
            margin-top: 60px;
            padding: 30px 0;
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
    <meta name="description" content="المكتب الوطني لجمعية سفراء الخير - جمعية وطنية تعنى بالعمل الخيري، التخييم، والأنشطة التربوية والاجتماعية في المغرب.">
<meta name="keywords" content="سفراء الخير, جمعية سفراء الخير, المكتب الوطني, مخيمات صيفية المغرب, عمل خيري المغرب, تطوع المغرب">
<meta name="author" content="المكتب الوطني لسفراء الخير">

<meta property="og:title" content="المكتب الوطني لسفراء الخير | الموقع الرسمي">
<meta property="og:description" content="شاركنا العطاء وكن سفيراً للخير. الموقع الرسمي للجمعية بالمغرب.">
<meta property="og:image" content="Image1.jpeg"> <meta property="og:url" content="https://www.yourdomain.com">
</head>
<body>

    <div class="container text-center">
        <a href="camps.html" class="back-btn shadow-sm">
            <i class="fas fa-arrow-right ms-2"></i> العودة للمخيمات
        </a>

        <br>

        <h1 class="gallery-title">ألبوم مخيم الحسيمة</h1>
        <p class="gallery-subtitle">أجمل اللحظات بين جبال الريف وشواطئ المتوسط</p>

        <div class="row g-4 mt-2">
            <div class="col-md-6 col-lg-3">
                <div class="photo-card shadow" onclick="showImage('houssima 1.jpg')">
                    <img src="houssima 1.jpg" alt="Hoceima Photo 1">
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="photo-card shadow" onclick="showImage('hossima.jpeg')">
                    <img src="hossima.jpeg" alt="Hoceima Photo 2">
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="photo-card shadow" onclick="showImage('hoceima3.jpg')">
                    <img src="hoceima3.jpg" alt="Hoceima Photo 3">
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="photo-card shadow" onclick="showImage('hoceima4.jpg')">
                    <img src="hoceima4.jpg" alt="Hoceima Photo 4">
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
                    <img src="" id="fullImage" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center">
        <p>جمعية سفراء الخير - فرع الحسيمة © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function showImage(src) {
            document.getElementById('fullImage').src = src;
            var myModal = new bootstrap.Modal(document.getElementById('imageModal'));
            myModal.show();
        }
    </script>
</body>
</html>
