<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة الثعبان | سفراء الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #1e3a8a; --warning-yellow: #fbbf24; }
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; margin: 0; touch-action: none; overflow: hidden; height: 100vh; }
        .nav-back { background: rgba(255,255,255,0.05); padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .game-area { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 85vh; padding: 20px; }
        canvas { background: #1e293b; border: 4px solid #334155; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); max-width: 100%; height: auto; }
        .score-board { font-size: 1.8rem; font-weight: 900; color: var(--warning-yellow); margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .controls-hint { margin-top: 15px; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="nav-back text-end">
        <div class="container">
            <a href="games.html" class="text-decoration-none fw-bold text-white">
                <i class="fas fa-arrow-right ms-2 text-warning"></i> خروج للألعاب
            </a>
        </div>
    </div>

    <div class="game-area">
        <div class="score-board">النقاط: <span id="score">0</span></div>
        <canvas id="snakeGame" width="400" height="400"></canvas>
        
        <div class="controls-hint d-none d-md-block">العب بواسطة أصهم لوحة المفاتيح ⌨️</div>
        <div class="controls-hint d-md-none">مرر إصبعك (Swipe) للتحكم في الثعبان 📱</div>

        <button class="btn btn-outline-warning mt-4 rounded-pill px-4 fw-bold" onclick="location.reload()">إعادة تحميل</button>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const box = 20;
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = {
            x: Math.floor(Math.random() * 19) * box,
            y: Math.floor(Math.random() * 19) * box
        };
        let d = ""; 
        let score = 0;
        let gameSpeed = 120;

        // تحكم الـ PC (Keyboard)
        document.addEventListener("keydown", (e) => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });

        // تحكم الـ Mobile (Swipe)
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        document.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, false);

        function handleSwipe(startX, startY, endX, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && d != "LEFT") d = "RIGHT";
                else if (diffX < 0 && d != "RIGHT") d = "LEFT";
            } else {
                if (diffY > 0 && d != "UP") d = "DOWN";
                else if (diffY < 0 && d != "DOWN") d = "UP";
            }
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#fbbf24" : "#f59e0b";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#1e293b";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerText = score;
                food = {
                    x: Math.floor(Math.random() * 19) * box,
                    y: Math.floor(Math.random() * 19) * box
                };
            } else {
                if (d) snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(d && (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake))) {
                clearInterval(gameInterval);
                alert("Game Over! \nنقاطك: " + score);
                location.reload(); // إعادة تحميل الصفحة فوراً
            }

            if (d) snake.unshift(newHead);
        }

        let gameInterval = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
