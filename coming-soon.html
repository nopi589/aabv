    <style>
        :root { --main-blue: #1e3a8a; --accent-red: #ef4444; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #1e3a8a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin: 0;
            padding: 20px; /* هامش للأمان في التلفون */
            overflow-x: hidden;
        }

        .coming-soon-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }

        /* تعديل اللوغو باش يكون متناسق */
        .logo-img {
            width: 120px; /* أصغر شوية باش يناسب التلفون */
            height: 120px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            padding: 10px;
            margin-bottom: 25px;
            animation: pulse-logo 2s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        h1 { 
            font-weight: 900; 
            font-size: 2.2rem; /* قياس مناسب للتلفون والبيسي */
            margin-bottom: 15px; 
        }

        .subtitle { 
            font-size: 1rem; 
            opacity: 0.9; 
            margin-bottom: 30px; 
            line-height: 1.6;
        }

        .btn-home {
            background: var(--accent-red);
            color: white;
            border-radius: 50px;
            padding: 10px 30px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
            border: 2px solid transparent;
            width: 80%; /* عريض شوية في التلفون باش يسهل الكليك */
            max-width: 250px;
        }

        .social-links a {
            color: white;
            margin: 0 10px;
            font-size: 1.5rem;
            opacity: 0.8;
            transition: 0.3s;
        }

        @keyframes pulse-logo {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* إخفاء الدوائر الكبيرة في التلفون إلا كانت غاتخسر الديكور */
        @media (max-width: 576px) {
            h1 { font-size: 1.8rem; }
            .logo-img { width: 100px; height: 100px; }
            .coming-soon-container { padding: 30px 15px; }
        }
