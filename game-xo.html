<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة XO | سفراء الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-blue: #1e3a8a; --accent-red: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; min-height: 100vh; overflow-x: hidden; }
        
        /* واجهة الاختيار */
        #setup-screen {
            position: fixed; inset: 0; background: white; z-index: 2000;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }

        .mode-card {
            border: 2px solid #f1f5f9; border-radius: 20px; padding: 25px;
            cursor: pointer; transition: 0.3s; height: 100%;
        }
        .mode-card:hover { border-color: var(--main-blue); transform: translateY(-5px); background: #f8fafc; }
        .mode-card i { font-size: 3rem; color: var(--main-blue); margin-bottom: 15px; }

        /* واجهة اللعبة */
        .nav-back { background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .game-container { display: flex; align-items: center; justify-content: center; padding: 20px; min-height: calc(100vh - 70px); }
        .game-card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 25px 0; }
        .cell { 
            aspect-ratio: 1/1; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900;
            cursor: pointer; transition: 0.2s;
        }
        .cell:hover { background: #edf2f7; }
        .cell.x { color: var(--accent-red); }
        .cell.o { color: var(--main-blue); }
        .status { font-size: 1.2rem; font-weight: 700; color: var(--main-blue); min-height: 30px; }
        .reset-btn { width: 100%; border-radius: 50px; padding: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="container">
            <h2 class="fw-900 mb-5">اختار كيفاش بغيتي تلعب؟</h2>
            <div class="row g-4 justify-content-center">
                <div class="col-6 col-md-4">
                    <div class="mode-card" onclick="startGame('ai')">
                        <i class="fas fa-robot"></i>
                        <h4 class="fw-bold">ضد الكمبيوتر</h4>
                        <p class="text-muted d-none d-md-block">اختبر ذكاءك ضد الـ AI</p>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="mode-card" onclick="startGame('friend')">
                        <i class="fas fa-users"></i>
                        <h4 class="fw-bold">ضد صديق</h4>
                        <p class="text-muted d-none d-md-block">العب مع شخص بجانبك</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-back shadow-sm">
        <div class="container text-end">
            <a href="games.html" class="text-decoration-none fw-bold text-dark">
                <i class="fas fa-arrow-right ms-2 text-primary"></i> رجوع لمركز الألعاب
            </a>
        </div>
    </div>

    <div class="game-container">
        <div class="game-card">
            <h3 class="fw-900 mb-1" id="game-title">لعبة XO</h3>
            <p id="mode-text" class="badge bg-light text-dark mb-4"></p>
            
            <div class="status" id="status">دور اللاعب: X</div>
            
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary reset-pill w-50 rounded-pill" onclick="location.reload()">تغيير النمط</button>
                <button class="btn btn-primary reset-btn w-50 rounded-pill shadow" onclick="resetGame()">إعادة اللعب</button>
            </div>
        </div>
    </div>

    <script>
        let gameMode = ''; // 'ai' or 'friend'
        let currentPlayer = 'X';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;

        const statusElement = document.getElementById('status');
        const boardElement = document.getElementById('board');

        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function startGame(mode) {
            gameMode = mode;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('mode-text').innerText = mode === 'ai' ? 'ضد الذكاء الاصطناعي' : 'ضد صديقك';
            updateStatus();
        }

        function handleCellClick(e) {
            const index = e.target.getAttribute('data-index');
            if (gameState[index] !== "" || !gameActive) return;

            makeMove(index, currentPlayer);
            
            if (gameActive) {
                if (gameMode === 'ai') {
                    gameActive = false; // بلوكي اللعب حتى يلعب الـ AI
                    statusElement.innerText = "الكمبيوتر يفكر...";
                    setTimeout(aiMove, 600);
                } else {
                    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                    updateStatus();
                }
            }
        }

        function makeMove(index, player) {
            gameState[index] = player;
            const cell = document.querySelector(`[data-index='${index}']`);
            cell.innerText = player;
            cell.classList.add(player.toLowerCase());
            checkWinner();
        }

        function aiMove() {
            gameActive = true;
            let move = findBestMove('O') || findBestMove('X');
            
            if (move === null) {
                const available = gameState.map((v, i) => v === "" ? i : null).filter(v => v !== null);
                move = available[Math.floor(Math.random() * available.length)];
            }

            if (move !== undefined) makeMove(move, 'O');
            if (gameActive) updateStatus();
        }

        function findBestMove(p) {
            for (let pattern of winPatterns) {
                const [a, b, c] = pattern;
                const vals = [gameState[a], gameState[b], gameState[c]];
                if (vals.filter(v => v === p).length === 2 && vals.filter(v => v === "").length === 1) {
                    return pattern[vals.indexOf("")];
                }
            }
            return null;
        }

        function checkWinner() {
            let win = false;
            for (let p of winPatterns) {
                if (gameState[p[0]] && gameState[p[0]] === gameState[p[1]] && gameState[p[0]] === gameState[p[2]]) {
                    win = true; break;
                }
            }

            if (win) {
                statusElement.innerHTML = `الفائز هو <span class="${currentPlayer === 'X' ? 'text-danger' : 'text-primary'}">${currentPlayer}</span> 🎉`;
                gameActive = false;
            } else if (!gameState.includes("")) {
                statusElement.innerText = "تعادل! 🤝";
                gameActive = false;
            }
        }

        function updateStatus() {
            const color = currentPlayer === 'X' ? 'text-danger' : 'text-primary';
            statusElement.innerHTML = `دور اللاعب: <span class="${color}">${currentPlayer}</span>`;
        }

        function resetGame() {
            gameState = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            currentPlayer = 'X';
            updateStatus();
            document.querySelectorAll('.cell').forEach(c => { c.innerText = ""; c.classList.remove('x', 'o'); });
        }

        boardElement.addEventListener('click', handleCellClick);
    </script>
</body>
</html>
