backend:
  name: git-gateway
  branch: main # تأكد واش سميتو main ولا master

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "الأخبار والمقالات"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "العنوان", name: "title", widget: "string"}
      - {label: "التاريخ", name: "date", widget: "datetime"}
      - {label: "الصورة الرئيسية", name: "image", widget: "image"}
      - {label: "نص المقال", name: "body", widget: "markdown"}