<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطوع معنا | سفراء الخير</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #1e3a8a; color: white; min-height: 100vh; display: flex; align-items: center; padding: 20px 0; }
        .form-box { background: white; color: #333; border-radius: 20px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .form-control:focus { border-color: #1e3a8a; box-shadow: 0 0 0 0.25 hide rgba(30, 58, 138, 0.25); }
    </style>
    <meta name="description" content="المكتب الوطني لجمعية سفراء الخير - جمعية وطنية تعنى بالعمل الخيري، التخييم، والأنشطة التربوية والاجتماعية في المغرب.">
<meta name="keywords" content="سفراء الخير, جمعية سفراء الخير, المكتب الوطني, مخيمات صيفية المغرب, عمل خيري المغرب, تطوع المغرب">
<meta name="author" content="المكتب الوطني لسفراء الخير">

<meta property="og:title" content="المكتب الوطني لسفراء الخير | الموقع الرسمي">
<meta property="og:description" content="شاركنا العطاء وكن سفيراً للخير. الموقع الرسمي للجمعية بالمغرب.">
<meta property="og:image" content="Image1.jpeg"> <meta property="og:url" content="https://www.yourdomain.com">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="form-box">
                    <h2 class="fw-900 text-center mb-4" style="color: #1e3a8a;">طلب انضمام متطوع</h2>
                    
                    <form action="https://api.web3forms.com/submit" method="POST">

                        <input type="hidden" name="access_key" value="e2ae0e54-e1e0-442b-9f88-8f2643174729">

                        <input type="hidden" name="subject" value="طلب تطوع جديد - سفراء الخير">
                        <input type="hidden" name="from_name" value="موقع سفراء الخير">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold small">الاسم الكامل</label>
                            <input type="text" name="name" class="form-control py-2" placeholder="أدخل اسمك الكامل" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small">المدينة</label>
                            <input type="text" name="city" class="form-control py-2" placeholder="مثال: جرسيف، وجدة..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small">البريد الإلكتروني</label>
                            <input type="email" name="email" class="form-control py-2" placeholder="email@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small">رقم الهاتف (واتساب)</label>
                            <input type="tel" name="phone" class="form-control py-2" placeholder="06XXXXXXXX" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small">مجال اهتمامك</label>
                            <select name="interest" class="form-select py-2" required>
                                <option value="" selected disabled>اختر التخصص...</option>
                                <option value="ميداني">عمل ميداني وتوزيع مساعدات</option>
                                <option value="تنظيمي">تنظيم فعاليات ومخيمات</option>
                                <option value="تواصل">تصوير وتواصل اجتماعي</option>
                                <option value="طبي">مساعدة في قوافل طبية</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small">رسالة قصيرة (اختياري)</label>
                            <textarea name="message" class="form-control" rows="3" placeholder="علاش بغيتي تنضم لينا؟"></textarea>
                        </div>

                        <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                        <button type="submit" class="btn btn-danger w-100 py-3 fw-bold rounded-pill shadow">إرسال الطلب الآن</button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="index.html" class="text-decoration-none small text-muted">← العودة للرئيسية</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
